name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'バージョン番号 (例: 1.2.0)'
        required: true

jobs:
  version-bump:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    outputs:
      version: ${{ steps.set-version.outputs.version }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Set version
        id: set-version
        run: |
          echo "VERSION_NAME=$INPUT_VERSION" >> $GITHUB_ENV
          echo "version=$INPUT_VERSION" >> $GITHUB_OUTPUT
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}

      - name: Update appVersion in gradle.properties
        run: sed -i "s/^appVersion=.*/appVersion=$VERSION_NAME/" gradle.properties

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gradle.properties
          git commit -m "chore: bump version to $VERSION_NAME [skip ci]"
          git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/ai-kurou/KoDriver.git main

  build-msi:
    needs: version-bump
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main

      - name: Set up JDK
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          java-version: 17
          distribution: temurin
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Build MSI
        run: ./gradlew :app:desktopApp:packageMsi

      - name: Rename MSI
        shell: bash
        env:
          VERSION_NAME: ${{ needs.version-bump.outputs.version }}
        run: |
          mv app/desktopApp/build/compose/binaries/main/msi/KoDriver-${VERSION_NAME}.msi \
             app/desktopApp/build/compose/binaries/main/msi/KoDriver-windows-${VERSION_NAME}.msi

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: msi
          path: app/desktopApp/build/compose/binaries/main/msi/KoDriver-windows-${{ needs.version-bump.outputs.version }}.msi

  build-apk:
    needs: version-bump
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main

      - name: Set up JDK
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          java-version: 17
          distribution: temurin
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Build APK
        run: ./gradlew :app:androidApp:assembleRelease

      - name: Rename APK
        env:
          VERSION_NAME: ${{ needs.version-bump.outputs.version }}
        run: |
          mv app/androidApp/build/outputs/apk/release/androidApp-release.apk \
             app/androidApp/build/outputs/apk/release/KoDriver-android-${VERSION_NAME}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: app/androidApp/build/outputs/apk/release/KoDriver-android-${{ needs.version-bump.outputs.version }}.apk

  create-release:
    needs: [version-bump, build-msi, build-apk]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Download MSI
        uses: actions/download-artifact@v4
        with:
          name: msi
          path: artifacts/

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: apk
          path: artifacts/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION_NAME: ${{ needs.version-bump.outputs.version }}
        run: |
          gh release create "v$VERSION_NAME" \
            --repo ai-kurou/KoDriver \
            --title "Release v$VERSION_NAME" \
            --generate-notes \
            artifacts/KoDriver-windows-${VERSION_NAME}.msi \
            artifacts/KoDriver-android-${VERSION_NAME}.apk
