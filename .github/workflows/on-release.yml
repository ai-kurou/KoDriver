name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'バージョン番号 (例: 1.2.0)'
        required: true

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 15
    permissions:
      contents: write  # リリース作成 + main へのpushに必要

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Set up JDK
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          java-version: 17
          distribution: temurin
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Set version
        shell: bash
        run: echo "VERSION_NAME=$INPUT_VERSION" >> $GITHUB_ENV
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}

      - name: Update appVersion in gradle.properties
        shell: bash
        run: sed -i "s/^appVersion=.*/appVersion=$VERSION_NAME/" gradle.properties

      - name: Commit version bump
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gradle.properties
          git commit -m "chore: bump version to $VERSION_NAME [skip ci]"
          git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/ai-kurou/KoDriver.git main

      - name: Build MSI
        run: ./gradlew :app:desktopApp:packageMsi

      - name: Rename MSI
        shell: bash
        run: |
          mv app/desktopApp/build/compose/binaries/main/msi/KoDriver-${VERSION_NAME}.msi \
             app/desktopApp/build/compose/binaries/main/msi/KoDriver-windows-${VERSION_NAME}.msi

      - name: Create GitHub Release
        shell: bash
        run: |
          gh release create "v$VERSION_NAME" \
            --title "Release v$VERSION_NAME" \
            --generate-notes \
            app/desktopApp/build/compose/binaries/main/msi/KoDriver-windows-${VERSION_NAME}.msi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
