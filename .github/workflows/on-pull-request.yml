name: On Pull Request

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - run: ./gradlew :app:androidApp:lintDebug

  module-graph-assert:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - run: ./gradlew assertModuleGraph

  update-module-graph:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: module-graph-assert
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Install Graphviz
        run: sudo apt-get install -y graphviz

      - name: Generate module graph images
        run: ./gradlew generateModuleGraphImages

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/graphs/ README.md 2>/dev/null || true
          find . -name "README.md" \
            -not -path "*/build/*" -not -path "*/.git/*" | xargs -r git add
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update module graph images"
            git push
          fi

  detekt:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - run: ./gradlew detekt

  unit-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - run: ./gradlew koverXmlReport

      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: build/reports/kover/report.xml

  screenshot-test-jvm:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: true

      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Install Japanese fonts
        run: sudo apt-get install -y fonts-noto-cjk

      - name: Record JVM golden images
        run: ./gradlew :feature:readout-list:recordRoborazziJvmTest :feature:gt7-ps5-readout-remaining-fuel-laps-detail:recordRoborazziJvmTest :feature:lmu-windows-readout-vehicle-approach-detail:recordRoborazziJvmTest :feature:lmu-windows-readout-vehicle-damage-detail:recordRoborazziJvmTest :feature:lmu-windows-readout-flag-detail:recordRoborazziJvmTest :feature:other-license-detail:recordRoborazziJvmTest :feature:other-list:recordRoborazziJvmTest :feature:other-readout-start-sound-detail:recordRoborazziJvmTest :feature:other-console-ip-detail:recordRoborazziJvmTest :feature:other-server-ip-detail:recordRoborazziJvmTest :feature:other-volume-detail:recordRoborazziJvmTest :feature:other-keep-screen-on-detail:recordRoborazziJvmTest :app:shared:recordRoborazziJvmTest

      - name: Commit updated JVM golden images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          find . -path "*/jvmTest/snapshots/*.png" -not -path "*/build/*" -print0 | xargs -0 -r git add
          git diff --staged --quiet || git commit -m "chore: update golden images"
          git pull --rebase origin ${{ github.head_ref }}
          git push

      - name: Verify JVM screenshot tests
        run: ./gradlew :feature:readout-list:verifyRoborazziJvmTest :feature:gt7-ps5-readout-remaining-fuel-laps-detail:verifyRoborazziJvmTest :feature:lmu-windows-readout-vehicle-approach-detail:verifyRoborazziJvmTest :feature:lmu-windows-readout-vehicle-damage-detail:verifyRoborazziJvmTest :feature:lmu-windows-readout-flag-detail:verifyRoborazziJvmTest :feature:other-license-detail:verifyRoborazziJvmTest :feature:other-list:verifyRoborazziJvmTest :feature:other-readout-start-sound-detail:verifyRoborazziJvmTest :feature:other-console-ip-detail:verifyRoborazziJvmTest :feature:other-server-ip-detail:verifyRoborazziJvmTest :feature:other-volume-detail:verifyRoborazziJvmTest :feature:other-keep-screen-on-detail:verifyRoborazziJvmTest :app:shared:verifyRoborazziJvmTest

  screenshot-test-android:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: true

      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Install Japanese fonts
        run: sudo apt-get install -y fonts-noto-cjk

      - name: Record Android golden images
        run: ./gradlew :feature:other-list:recordRoborazziAndroidHostTest :feature:other-volume-detail:recordRoborazziAndroidHostTest :feature:other-license-detail:recordRoborazziAndroidHostTest :feature:other-console-ip-detail:recordRoborazziAndroidHostTest :feature:other-readout-start-sound-detail:recordRoborazziAndroidHostTest :feature:other-keep-screen-on-detail:recordRoborazziAndroidHostTest :app:shared:recordRoborazziAndroidHostTest

      - name: Commit updated Android golden images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          find . -path "*/androidHostTest/snapshots/*.png" -not -path "*/build/*" -print0 | xargs -0 -r git add
          git diff --staged --quiet || git commit -m "chore: update golden images"
          git pull --rebase origin ${{ github.head_ref }}
          git push

      - name: Verify Android screenshot tests
        run: ./gradlew :feature:other-list:verifyRoborazziAndroidHostTest :feature:other-volume-detail:verifyRoborazziAndroidHostTest :feature:other-license-detail:verifyRoborazziAndroidHostTest :feature:other-console-ip-detail:verifyRoborazziAndroidHostTest :feature:other-readout-start-sound-detail:verifyRoborazziAndroidHostTest :feature:other-keep-screen-on-detail:verifyRoborazziAndroidHostTest :app:shared:verifyRoborazziAndroidHostTest

  desktop-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - run: ./gradlew :app:desktopApp:test

  android-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.37.0
        with:
          api-level: 36
          arch: x86_64
          script: ./gradlew connectedDebugAndroidTest
