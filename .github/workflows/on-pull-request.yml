name: Pull Request

on:
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@48b5f213c81028ace310571dc5ec0fbbca0b2947 # v4.4.3

      - run: ./gradlew :app:androidApp:lintDebug

  module-graph-assert:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@48b5f213c81028ace310571dc5ec0fbbca0b2947 # v4.4.3

      - run: ./gradlew assertModuleGraph

  update-module-graph:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: module-graph-assert
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@48b5f213c81028ace310571dc5ec0fbbca0b2947 # v4.4.3

      - name: Install Graphviz
        run: sudo apt-get install -y graphviz

      - name: Generate module graph images
        run: ./gradlew generateModuleGraphImages

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/graphs/ README.md 2>/dev/null || true
          find . -name "README.md" \
            -not -path "*/build/*" -not -path "*/.git/*" | xargs -r git add
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update module graph images"
            git push
          fi

  detekt:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@48b5f213c81028ace310571dc5ec0fbbca0b2947 # v4.4.3

      - run: ./gradlew detekt

  unit-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@48b5f213c81028ace310571dc5ec0fbbca0b2947 # v4.4.3

      - run: ./gradlew koverXmlReport

      - uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5.5.4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: build/reports/kover/report.xml

  screenshot-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: true

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@48b5f213c81028ace310571dc5ec0fbbca0b2947 # v4.4.3

      - name: Install Japanese fonts
        run: sudo apt-get install -y fonts-noto-cjk

      - name: Record golden images
        run: ./gradlew :feature:readout-list:recordRoborazziJvmTest :feature:lmu-windows-readout-vehicle-approach-detail:recordRoborazziJvmTest :feature:lmu-windows-readout-vehicle-damage-detail:recordRoborazziJvmTest :feature:lmu-windows-readout-flag-detail:recordRoborazziJvmTest :feature:other-license-detail:recordRoborazziJvmTest :feature:other-list:recordRoborazziJvmTest :feature:other-server-ip-detail:recordRoborazziJvmTest :feature:other-volume-detail:recordRoborazziJvmTest :app:shared:recordRoborazziJvmTest

      - name: Commit updated golden images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          find . -path "*/jvmTest/snapshots/*.png" -not -path "*/build/*" | xargs -r git add
          git diff --staged --quiet || git commit -m "chore: update golden images"
          git push

      - name: Verify screenshot tests
        run: ./gradlew :feature:readout-list:verifyRoborazziJvmTest :feature:lmu-windows-readout-vehicle-approach-detail:verifyRoborazziJvmTest :feature:lmu-windows-readout-vehicle-damage-detail:verifyRoborazziJvmTest :feature:lmu-windows-readout-flag-detail:verifyRoborazziJvmTest :feature:other-license-detail:verifyRoborazziJvmTest :feature:other-list:verifyRoborazziJvmTest :feature:other-server-ip-detail:verifyRoborazziJvmTest :feature:other-volume-detail:verifyRoborazziJvmTest :app:shared:verifyRoborazziJvmTest

  desktop-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@48b5f213c81028ace310571dc5ec0fbbca0b2947 # v4.4.3

      - run: ./gradlew :app:desktopApp:test

  android-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@48b5f213c81028ace310571dc5ec0fbbca0b2947 # v4.4.3

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.37.0
        with:
          api-level: 36
          arch: x86_64
          script: ./gradlew connectedDebugAndroidTest
