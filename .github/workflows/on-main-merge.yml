name: On Main Merge

on:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  detekt:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - run: ./gradlew detekt

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - run: ./gradlew :app:androidApp:lintDebug

  module-graph-assert:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - run: ./gradlew assertModuleGraph

  unit-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - run: ./gradlew koverXmlReport

      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: build/reports/kover/report.xml

  screenshot-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Install Japanese fonts
        run: sudo apt-get install -y fonts-noto-cjk

      - name: Record golden images
        run: ./gradlew :feature:readout-list:recordRoborazziJvmTest :feature:lmu-windows-readout-vehicle-approach-detail:recordRoborazziJvmTest :feature:lmu-windows-readout-flag-detail:recordRoborazziJvmTest :feature:other-license-detail:recordRoborazziJvmTest :feature:other-list:recordRoborazziJvmTest :feature:other-server-ip-detail:recordRoborazziJvmTest :feature:other-volume-detail:recordRoborazziJvmTest :feature:lmu-windows-readout-vehicle-damage-detail:recordRoborazziJvmTest :app:shared:recordRoborazziJvmTest

      - name: Commit updated golden images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          find . -path "*/jvmTest/snapshots/*.png" -not -path "*/build/*" -print0 | xargs -0 -r git add
          git diff --staged --quiet || git commit -m "chore: update golden images [skip ci]"
          git pull --rebase origin main
          git push

      - name: Verify screenshot tests
        run: ./gradlew :feature:readout-list:verifyRoborazziJvmTest :feature:lmu-windows-readout-vehicle-approach-detail:verifyRoborazziJvmTest :feature:lmu-windows-readout-flag-detail:verifyRoborazziJvmTest :feature:other-license-detail:verifyRoborazziJvmTest :feature:other-list:verifyRoborazziJvmTest :feature:other-server-ip-detail:verifyRoborazziJvmTest :feature:other-volume-detail:verifyRoborazziJvmTest :feature:lmu-windows-readout-vehicle-damage-detail:verifyRoborazziJvmTest :app:shared:verifyRoborazziJvmTest

  # koverXmlReport はデスクトップの JAR を生成するが、Android の APK は生成しない。
  android-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - run: ./gradlew :app:androidApp:assembleDebug

  windows-build:
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - run: ./gradlew :app:desktopApp:jar
