name: On Main Merge

on:
  push:
    branches: [ main ]

jobs:
  module-graph-assert:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - run: ./gradlew assertModuleGraph

  update-module-graph:
    runs-on: ubuntu-latest
    needs: module-graph-assert
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Install Graphviz
        run: sudo apt-get install -y graphviz

      - name: Generate module graph images
        run: ./gradlew generateModuleGraphImages

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/graphs/ README.md **/README.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update module graph images [skip ci]"
            git push
          fi
