name: Build Windows

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build MSI
        run: ./gradlew :app:desktopApp:packageMsi

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: KoDriver-windows
          path: app/desktopApp/build/compose/binaries/main/msi/*.msi
          retention-days: 30
