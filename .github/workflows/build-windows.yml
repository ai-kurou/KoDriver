name: Build Windows

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Get version
        id: version
        run: echo "version=$(grep '^appVersion=' gradle.properties | cut -d'=' -f2)" >> $env:GITHUB_OUTPUT

      - name: Build MSI
        run: ./gradlew :app:desktopApp:packageMsi

      - name: Upload MSI
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: KoDriver-windows-${{ steps.version.outputs.version }}-release
          path: app/desktopApp/build/compose/binaries/main/msi/*.msi
          retention-days: 30
